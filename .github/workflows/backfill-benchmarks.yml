name: Backfill Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run benchmarks for each tag
        run: |
          mkdir -p results
          for TAG in $(git tag --sort=creatordate); do
            echo "=== Benchmarking $TAG ==="
            git checkout "$TAG" -- . 2>/dev/null || { echo "Skipping $TAG (checkout failed)"; continue; }
            git clean -fd --exclude=results 2>/dev/null
            pip install --force-reinstall --no-deps -e . 2>/dev/null && pip install -e ".[dev,vis]" 2>/dev/null || { echo "Skipping $TAG (install failed)"; git checkout main -- .; continue; }
            if [ ! -d "test/performance" ]; then
              echo "Skipping $TAG (no test/performance/)"
              git checkout main -- .
              continue
            fi
            python -m pytest test/performance \
              --benchmark-json="results/${TAG}.json" \
              --seed=12345 || { echo "Skipping $TAG (benchmarks failed)"; }
            git checkout main -- .
          done
      - name: Assemble data.js
        run: python .github/scripts/assemble_benchmark_data.py
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: benchmarks-output
          target-folder: benchmarks
