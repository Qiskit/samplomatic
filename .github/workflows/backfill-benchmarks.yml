name: Backfill Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run benchmarks for each tag
        run: |
          RESULTS_DIR="$(pwd)/results"
          mkdir -p "$RESULTS_DIR"
          for TAG in $(git tag --sort=creatordate); do
            echo "=== Benchmarking $TAG ==="
            git checkout "$TAG" 2>/dev/null || { echo "Skipping $TAG (checkout failed)"; continue; }
            pip install --force-reinstall --no-deps -e . && pip install -e ".[dev,vis]" || { echo "Skipping $TAG (install failed)"; continue; }
            if [ ! -d "test/performance" ]; then
              echo "Skipping $TAG (no test/performance/)"
              continue
            fi
            python -m pytest test/performance \
              --benchmark-json="${RESULTS_DIR}/${TAG}.json" \
              --seed=12345 || { echo "Skipping $TAG (benchmarks failed)"; rm -f "${RESULTS_DIR}/${TAG}.json"; }
          done
          git checkout main
      - name: Assemble data.js
        run: python .github/scripts/assemble_benchmark_data.py
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: benchmarks-output
          target-folder: benchmarks
