name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,vis]"
      - name: Run benchmarks
        run: |
          mkdir -p results
          python -m pytest test/performance \
            --benchmark-json="results/$(git rev-parse HEAD).json" \
            --seed=12345
      - name: Check for alert
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: results/${{ github.sha }}.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          save-data-file: false
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
      - name: Fetch gh-pages
        run: git fetch origin gh-pages || true
      - name: Assemble data.js
        run: python .github/scripts/assemble_benchmark_data.py
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: benchmarks-output
          target-folder: benchmarks
